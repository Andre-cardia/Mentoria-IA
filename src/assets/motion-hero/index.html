<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hero Blob Interativo — V2</title>
  <style>
    :root{
      --mx: 50%;
      --my: 50%;
      --tiltX: 0deg;
      --tiltY: 0deg;
      --scale: 1;
      --glow: .28;
    }

    *{ box-sizing:border-box; }
    html, body{ margin:0; min-height:100%; }

    body{
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 70% 40%, rgba(255,120,32,.10), transparent 28%),
        radial-gradient(circle at 35% 52%, rgba(255,230,190,.08), transparent 30%),
        #040404;
      color:#fff;
      overflow-x:hidden;
    }

    .hero{
      min-height:100vh;
      display:grid;
      grid-template-columns:minmax(0,.95fr) minmax(420px,1.05fr);
      align-items:center;
      gap:48px;
      padding:64px clamp(24px, 6vw, 96px);
      position:relative;
      overflow:hidden;
      isolation:isolate;
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:-15%;
      background:
        radial-gradient(circle at var(--mx) var(--my), rgba(255,106,0,.12), transparent 16%),
        radial-gradient(circle at 50% 50%, rgba(255,230,190,.05), transparent 34%);
      filter:blur(24px);
      opacity:var(--glow);
      z-index:-1;
      transition:opacity .25s ease;
    }

    .copy{ max-width:640px; z-index:2; }
    .eyebrow{
      display:inline-flex;
      padding:8px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.04);
      color:rgba(255,255,255,.74);
      margin-bottom:22px;
      font-size:14px;
    }

    h1{
      margin:0 0 20px;
      font-size:clamp(44px, 6vw, 84px);
      line-height:.95;
      letter-spacing:-.07em;
      max-width:9ch;
    }

    p{
      margin:0 0 30px;
      max-width:560px;
      color:rgba(255,255,255,.72);
      font-size:clamp(18px, 1.8vw, 22px);
      line-height:1.55;
    }

    .cta{ display:flex; gap:14px; flex-wrap:wrap; }
    .button{
      border:0;
      border-radius:999px;
      padding:14px 22px;
      font-weight:700;
      cursor:pointer;
    }
    .button.primary{
      color:#090909;
      background:linear-gradient(135deg, #fff0d5, #ff6500);
      box-shadow:0 16px 48px rgba(255,104,0,.20);
    }
    .button.secondary{
      color:#fff;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.16);
    }

    .stage{
      min-height:min(68vw, 760px);
      display:grid;
      place-items:center;
      perspective:1200px;
      position:relative;
    }

    .blob{
      width:min(58vw, 900px);
      max-width:100%;
      aspect-ratio:16/9;
      display:grid;
      place-items:center;
      transform:
        rotateX(var(--tiltX))
        rotateY(var(--tiltY))
        scale(var(--scale));
      transition:transform .55s cubic-bezier(.16,1,.3,1);
      will-change:transform, filter;
      filter:url(#liquid-distortion) drop-shadow(0 0 22px rgba(255,119,0,.18));
    }

    .blob img{
      display:block;
      width:100%;
      height:auto;
      pointer-events:none;
      user-select:none;
      animation:idleFloat 10s ease-in-out infinite;
    }

    .stage::after{
      content:"";
      position:absolute;
      width:56%;
      height:28%;
      left:24%;
      bottom:10%;
      background:radial-gradient(ellipse, rgba(255,98,0,.12), transparent 68%);
      filter:blur(22px);
      transform:translateY(22px);
      z-index:-1;
      opacity:.65;
    }

    @keyframes idleFloat{
      0%,100%{ transform:translate3d(0,-3px,0) rotate(-.2deg); }
      50%{ transform:translate3d(0,4px,0) rotate(.2deg); }
    }

    @media (max-width: 920px){
      .hero{
        grid-template-columns:1fr;
        gap:24px;
        padding-top:42px;
      }
      .stage{ min-height:44vh; }
      .blob{ width:min(96vw, 760px); }
      .copy{ order:2; }
      .stage{ order:1; }
    }

    @media (prefers-reduced-motion: reduce){
      .blob, .blob img{ animation:none; transition:none; }
    }
  </style>
</head>
<body>
  <svg width="0" height="0" style="position:absolute">
    <filter id="liquid-distortion">
      <feTurbulence
        id="turbulence"
        type="fractalNoise"
        baseFrequency="0.004 0.006"
        numOctaves="1"
        seed="8"
        result="noise"
      />
      <feDisplacementMap
        id="displacement"
        in="SourceGraphic"
        in2="noise"
        scale="0"
        xChannelSelector="R"
        yChannelSelector="G"
      />
    </filter>
  </svg>

  <main class="hero" id="hero">
    <section class="copy">
      <span class="eyebrow">AI Systems • Neural Interfaces • Liquid Motion</span>
      <h1>Agentes que se adaptam ao seu fluxo.</h1>
      <p>
        Versão com PNG transparente e deformação líquida bem mais sutil,
        ideal para usar como hero visual em um site.
      </p>
      <div class="cta">
        <button class="button primary">Começar agora</button>
        <button class="button secondary">Ver demonstração</button>
      </div>
    </section>

    <section class="stage" aria-label="Objeto neural abstrato interativo">
      <div class="blob" id="blob">
        <img src="./neural-blob-transparent.png" alt="Objeto neural abstrato metálico em laranja e creme com fundo transparente">
      </div>
    </section>
  </main>

  <script>
    const hero = document.getElementById("hero");
    const turbulence = document.getElementById("turbulence");
    const displacement = document.getElementById("displacement");

    let targetX = 0.5, targetY = 0.5;
    let currentX = 0.5, currentY = 0.5;
    let hovering = false;

    const lerp = (a,b,t) => a + (b-a)*t;

    function move(e){
      const r = hero.getBoundingClientRect();
      targetX = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
      targetY = Math.max(0, Math.min(1, (e.clientY - r.top) / r.height));
      hovering = true;
    }

    function leave(){
      targetX = 0.5;
      targetY = 0.5;
      hovering = false;
    }

    function animate(){
      currentX = lerp(currentX, targetX, 0.07);
      currentY = lerp(currentY, targetY, 0.07);

      const tiltY = (currentX - 0.5) * 3.2;
      const tiltX = -(currentY - 0.5) * 3.2;

      const distance = Math.abs(currentX - 0.5) + Math.abs(currentY - 0.5);

      // Deformação propositalmente mais sutil
      const displacementScale = hovering ? (0.8 + distance * 2.2) : 0.35;
      const freqX = 0.004 + distance * 0.003;
      const freqY = 0.006 + distance * 0.003;

      hero.style.setProperty("--mx", `${(currentX * 100).toFixed(2)}%`);
      hero.style.setProperty("--my", `${(currentY * 100).toFixed(2)}%`);
      hero.style.setProperty("--tiltX", `${tiltX.toFixed(3)}deg`);
      hero.style.setProperty("--tiltY", `${tiltY.toFixed(3)}deg`);
      hero.style.setProperty("--scale", hovering ? "1.006" : "1");
      hero.style.setProperty("--glow", hovering ? ".38" : ".28");

      turbulence.setAttribute("baseFrequency", `${freqX.toFixed(4)} ${freqY.toFixed(4)}`);
      displacement.setAttribute("scale", displacementScale.toFixed(2));

      requestAnimationFrame(animate);
    }

    hero.addEventListener("pointermove", move);
    hero.addEventListener("pointerleave", leave);

    animate();
  </script>
</body>
</html>
